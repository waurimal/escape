<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1학기 총복습 영어 방탈출</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f8ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: #2c3e50; cursor: pointer; }
        .input-group { margin: 15px 0; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        .hidden { display: none; }
        .letters { font-size: 24px; font-weight: bold; letter-spacing: 5px; color: #e74c3c; margin: 20px 0; }
        #teacher-area table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        #teacher-area th, #teacher-area td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        #teacher-area th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <h1 ondblclick="enterTeacherMode()">🕵️‍♂️ 1학기 복습 방탈출</h1>

    <div id="login-area">
        <p>방탈출에 도전할 요원 정보를 입력하세요.</p>
        <div class="input-group">
            <label>학년</label><input type="number" id="grade" placeholder="예: 6">
        </div>
        <div class="input-group">
            <label>반</label><input type="number" id="classNum" placeholder="예: 1">
        </div>
        <div class="input-group">
            <label>번호</label><input type="number" id="studentNum" placeholder="예: 12">
        </div>
        <div class="input-group">
            <label>이름</label><input type="text" id="studentName" placeholder="예: 홍길동">
        </div>
        <button onclick="startGame()">게임 시작하기</button>
    </div>

    <div id="game-area" class="hidden">
        <h2 id="mission-title">Mission 1</h2>
        <p id="mission-desc" style="font-size: 18px; line-height: 1.5; color: #555;"></p>
        
        <div class="input-group">
            <label>정답 (알파벳 1글자)</label>
            <input type="text" id="answer" maxlength="1" style="text-transform: uppercase; text-align: center; font-size: 20px;">
        </div>
        <button onclick="checkAnswer()">정답 확인</button>
        
        <div class="letters" id="collected-letters">_ _ _ _ _ _</div>
    </div>

    <div id="success-area" class="hidden">
        <h2>🎉 방탈출 성공! 🎉</h2>
        <p>선생님께 가서 완성된 코드를 조용히 말씀해 주세요!</p>
        <div class="letters">S U M M E R</div>
        <p>그리고 활동지의 질문에 대답하여 도장을 받으세요!</p>
    </div>

    <div id="teacher-area" class="hidden">
        <h2>👨‍🏫 교사 모드 (클리어 현황)</h2>
        <button onclick="loadStudentData()" style="width:auto; margin-bottom:10px;">새로고침</button>
        <button onclick="exitTeacherMode()" style="background-color:#7f8c8d; width:auto; margin-bottom:10px;">돌아가기</button>
        <table>
            <thead>
                <tr>
                    <th>학번/이름</th>
                    <th>상태</th>
                    <th>클리어 시간</th>
                </tr>
            </thead>
            <tbody id="student-list">
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. Firebase 설정 (선생님의 프로젝트 정보로 변경하세요)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebase 초기화
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // 2. 미션 데이터 설정
    const missions = [
        { desc: "Find the 1st letter of Ethan's grade.", answer: "S" },
        { desc: "Find the 2nd letter of the name of the person with the earliest birthday.", answer: "U" },
        { desc: "Find the 3rd letter of Chloe's favorite season.", answer: "M" },
        { desc: "Find the 1st letter of Chloe's test subject.", answer: "M" },
        { desc: "Find the 4th letter of the name of the building behind Judy's house.", answer: "E" },
        { desc: "Find the 2nd letter of the color of Liam's cap.", answer: "R" }
    ];

    let currentMission = 0;
    let studentInfo = {};
    let collectedLetters = [];

    // 3. 게임 로직
    function startGame() {
        const g = document.getElementById('grade').value;
        const c = document.getElementById('classNum').value;
        const n = document.getElementById('studentNum').value;
        const name = document.getElementById('studentName').value;

        if(!g || !c || !n || !name) {
            alert("정보를 모두 입력해주세요!");
            return;
        }

        studentInfo = { grade: g, class: c, number: n, name: name };
        
        document.getElementById('login-area').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        updateMissionUI();
    }

    function updateMissionUI() {
        document.getElementById('mission-title').innerText = `Mission ${currentMission + 1}`;
        document.getElementById('mission-desc').innerText = missions[currentMission].desc;
        document.getElementById('answer').value = "";
        document.getElementById('answer').focus();
        
        // 글자 표시 업데이트 (_ _ _ _ _ _)
        let displayStr = "";
        for(let i=0; i<missions.length; i++) {
            displayStr += (i < collectedLetters.length) ? collectedLetters[i] + " " : "_ ";
        }
        document.getElementById('collected-letters').innerText = displayStr.trim();
    }

    function checkAnswer() {
        const userAnswer = document.getElementById('answer').value.toUpperCase();
        if(userAnswer === missions[currentMission].answer) {
            collectedLetters.push(userAnswer);
            currentMission++;
            
            if(currentMission < missions.length) {
                alert("정답입니다! 다음 미션으로 이동합니다.");
                updateMissionUI();
            } else {
                gameClear();
            }
        } else {
            alert("틀렸습니다. 활동지를 다시 확인해 보세요!");
        }
    }

    function gameClear() {
        document.getElementById('game-area').classList.add('hidden');
        document.getElementById('success-area').classList.remove('hidden');

        // Firebase에 클리어 데이터 저장
        const docId = `${studentInfo.grade}-${studentInfo.class}-${studentInfo.number}-${studentInfo.name}`;
        db.collection("escape_records").doc(docId).set({
            ...studentInfo,
            status: "CLEAR",
            clearTime: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(error => {
            console.error("Error saving document: ", error);
        });
    }

    // 4. 교사 모드 로직 (비밀번호: 0000)
    function enterTeacherMode() {
        const pwd = prompt("교사 인증 비밀번호를 입력하세요:");
        if(pwd === "0000") { // 비밀번호는 원하시는 대로 변경하세요.
            document.getElementById('login-area').classList.add('hidden');
            document.getElementById('game-area').classList.add('hidden');
            document.getElementById('success-area').classList.add('hidden');
            document.getElementById('teacher-area').classList.remove('hidden');
            loadStudentData();
        } else if(pwd !== null) {
            alert("비밀번호가 틀렸습니다.");
        }
    }

    function exitTeacherMode() {
        document.getElementById('teacher-area').classList.add('hidden');
        document.getElementById('login-area').classList.remove('hidden');
    }

    function loadStudentData() {
        const tbody = document.getElementById('student-list');
        tbody.innerHTML = "<tr><td colspan='3'>데이터 불러오는 중...</td></tr>";

        db.collection("escape_records")
          .orderBy("clearTime", "desc")
          .get()
          .then((querySnapshot) => {
            tbody.innerHTML = "";
            if(querySnapshot.empty) {
                tbody.innerHTML = "<tr><td colspan='3'>아직 완료한 학생이 없습니다.</td></tr>";
                return;
            }
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const timeStr = data.clearTime ? data.clearTime.toDate().toLocaleTimeString('ko-KR') : "알 수 없음";
                const row = `<tr>
                    <td>${data.grade}학년 ${data.class}반 ${data.number}번 ${data.name}</td>
                    <td style="color:green; font-weight:bold;">${data.status}</td>
                    <td>${timeStr}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }).catch((error) => {
            console.error("데이터 로드 에러:", error);
            tbody.innerHTML = "<tr><td colspan='3'>데이터를 불러오는 데 실패했습니다.</td></tr>";
        });
    }
</script>

</body>
</html>
